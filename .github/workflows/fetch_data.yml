name: Fetch Crypto OHLCV Data

# Manual trigger only for now — cron schedule will be added later once pipeline is verified
on:
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ccxt pandas pyarrow

      - name: Run fetch script
        run: |
          python scripts/fetch/fetch_ccxt.py

      - name: Commit and push fetched data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/crypto/raw/*.parquet
          git diff --cached --quiet || git commit -m "Update crypto OHLCV data"
          git push
